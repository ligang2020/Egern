policy_groups:
- auto_test:
    name: iBL3ND
    policies:
    - 新国节点
    - 香港节点
    - 日本节点
    - 韩国节点
    - 台湾节点
    - 美国节点
    flatten: false
    interval: 300
    tolerance: 20
    icon: https://iili.io/K0KrBdQ.png
    hidden: false
- select:
    name: 流媒体节点
    policies:
    - 台湾节点
    - 日本节点
    - 韩国节点
    - 新国节点
    - 美国节点
    flatten: true
    icon: https://iili.io/KSBUGgn.png
    hidden: false
- external:
    name: 手动选择
    type: select
    urls:
    - https://gist.githubusercontent.com/ligang2020/25beeb1c8e7e324487b10d4fb02cd556/raw/egern
    latency_test_url: https://connectivitycheck.gstatic.com/generate_204
    update_interval: 60
    icon: https://github.com/Repcz/Repcz.github.io/raw/main/docs/egern/Photo/Egern.png
    hidden: false
- select:
    name: 抖音IP修改
    policies:
    - 日本节点
    - 台湾节点
    - 新国节点
    - 美国节点
    - 韩国节点
    flatten: false
    icon: https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/04ProxySoft/tiktok.png
    hidden: false
- auto_test:
    name: 香港节点
    policies:
    - 手动选择
    flatten: true
    filter: ^(?!.*×).*(?:🇭🇰|Hong Kong|Hong|HK|HKG|香港).*$
    interval: 300
    tolerance: 0
    block_quic: true
    icon: https://iili.io/FaAI3Bt.png
    hidden: false
- auto_test:
    name: 新国节点
    policies:
    - 手动选择
    flatten: true
    filter: 🇸🇬|新加坡|Singapore|SG
    interval: 300
    tolerance: 0
    icon: https://iili.io/FaRfFXn.png
    hidden: false
- auto_test:
    name: 台湾节点
    policies:
    - 手动选择
    flatten: true
    filter: 🇹🇼|台湾|Taiwan|TW|Tai
    interval: 300
    tolerance: 0
    icon: https://iili.io/Kb9Iauj.png
    hidden: false
- auto_test:
    name: 日本节点
    policies:
    - 手动选择
    flatten: true
    filter: \b(?!.*×)\b(🇯🇵|日本|Japan|JP)\b
    interval: 300
    tolerance: 0
    icon: https://iili.io/Fa5AnTb.png
    hidden: false
- auto_test:
    name: 韩国节点
    policies:
    - 手动选择
    flatten: true
    filter: 🇰🇷|韩国|Korea|KR
    interval: 300
    tolerance: 0
    icon: https://iili.io/Fa5Mdn1.png
    hidden: false
- auto_test:
    name: 美国节点
    policies:
    - 手动选择
    flatten: true
    filter: 🇺🇸|美国|United States|USA|US|States
    interval: 300
    tolerance: 0
    icon: https://iili.io/FaAug7s.png
    hidden: false
- select:
